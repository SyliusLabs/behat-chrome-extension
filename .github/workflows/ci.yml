name: CI

on:
    push:
    pull_request:

jobs:
    lint:
        name: Lint (grumphp)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  coverage: none
                  tools: composer:v2

            - name: Install tooling
              run: composer require phpro/grumphp-shim ergebnis/composer-normalize enlightn/security-checker squizlabs/php_codesniffer --prefer-dist --ansi --no-progress --sort-packages

            - name: Run grumphp
              run: vendor/bin/grumphp run -n

    test:
        name: Test - ${{ matrix.label }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { php: '8.1', label: 'PHP 8.1' }
                    - { php: '8.2', label: 'PHP 8.2' }
                    - { php: '8.3', label: 'PHP 8.3' }
                    - { php: '8.4', label: 'PHP 8.4' }
                    - { php: '8.3', label: 'PHP 8.3 (Behat 4)', behat4: true }
                    - { php: '8.4', label: 'PHP 8.4 (Behat 4)', behat4: true }
                    - { php: '8.4', label: 'chrome-mink-driver dev', driver_dev: true }
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: none
                  tools: composer:v2

            - name: Setup Chrome
              uses: browser-actions/setup-chrome@v1

            - name: Get Composer cache directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: composer-${{ matrix.label }}-${{ hashFiles('composer.json') }}
                  restore-keys: |
                      composer-${{ matrix.label }}-
                      composer-

            - name: Require chrome-mink-driver dev-main
              if: ${{ matrix.driver_dev }}
              run: |
                  composer config repositories.chrome-mink-driver vcs https://gitlab.com/behat-chrome/chrome-mink-driver.git
                  composer require dmore/chrome-mink-driver:dev-main --no-update --ansi --no-progress

            - name: Require Behat 4
              if: ${{ matrix.behat4 }}
              run: composer require --no-update --ansi --no-progress "behat/behat:^4.0@alpha" "friends-of-behat/mink-extension:^3.0@alpha"

            - name: Install dependencies
              run: composer install -o --ansi --no-progress

            - name: Lint PHP sources
              run: find src/ -name '*.php' -print0 | xargs -0 -n 1 -P 4 php -ln

            - name: Run PHPUnit
              run: vendor/bin/phpunit --colors=always
